user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── 로그 포맷 ─────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';
    access_log /var/log/nginx/access.log main;

    # ─── 성능 설정 ─────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript;
    gzip_min_length    1024;

    # ─── 보안 헤더 ─────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-Frame-Options          "DENY"                            always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # X-XSS-Protection은 모던 브라우저에서 비권장 (CSP로 대체)
    server_tokens off;

    # ─── Rate Limit 설정 ───────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ─── HTTP → HTTPS 리다이렉트 ───────────────────
    server {
        listen 80;
        server_name api.gwanriwang.com;
        return 301 https://$server_name$request_uri;
    }

    # ─── API 서버 (HTTPS) ─────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.gwanriwang.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # TLS 설정 강화
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;  # TLS 1.3에서는 클라이언트 우선
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;  # PFS(완전 순방향 비밀) 강화

        # OCSP Stapling (인증서 폐기 확인 속도 개선)
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # HSTS: 1년, 서브도메인 포함, preload 등록
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── 헬스체크 (Rate Limit 제외) ──
        location /api/v1/health {
            proxy_pass http://backend:3001;
            access_log off;
        }

        # ── 인증 API (엄격한 Rate Limit) ──
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://backend:3001;
            include /etc/nginx/proxy_params;
        }

        # ── 일반 API ──
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend:3001;
            include /etc/nginx/proxy_params;

            # WebSocket 지원 (채팅 Socket.io)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── 파일 업로드 크기 제한 ──
        client_max_body_size 20M;
    }
}
