name: CI — 코드 품질 검사

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # Backend 검사
  # ─────────────────────────────────────────
  backend-check:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 타입 검사
        run: npx tsc --noEmit

      - name: 빌드 테스트
        run: npm run build

  # ─────────────────────────────────────────
  # Frontend 검사
  # ─────────────────────────────────────────
  frontend-check:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 타입 검사
        run: npx tsc --noEmit

      - name: 빌드 테스트
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          # Sentry 소스맵 업로드 비활성화 (CI에서는 빌드만 검증)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  # ─────────────────────────────────────────
  # Docker 이미지 빌드 테스트
  # ─────────────────────────────────────────
  docker-build:
    name: Docker 빌드 검증
    runs-on: ubuntu-latest
    needs: [backend-check]

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Backend 이미지 빌드 (푸시 없이)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: gwanri-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
